services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: akin_chat
      POSTGRES_USER: akin_chat
      POSTGRES_PASSWORD: akin_chat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@akin-chat.com
      PGADMIN_DEFAULT_PASSWORD: akin_chat
    depends_on:
      - postgres
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: ["--reload"]

volumes:
  pgdata:
  pgadmin_data:
